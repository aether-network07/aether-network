name: Build Aether APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore aether.keystore \
            -alias aether -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -dname "CN=Aether Network, OU=Mobile, O=Aether, L=Abidjan, S=CI, C=CI" \
            -storepass aether2026 -keypass aether2026

      - name: Build signed APK
        run: |
          gradle assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/aether.keystore \
            -Pandroid.injected.signing.store.password=aether2026 \
            -Pandroid.injected.signing.key.alias=aether \
            -Pandroid.injected.signing.key.password=aether2026

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aether-network-apk
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
